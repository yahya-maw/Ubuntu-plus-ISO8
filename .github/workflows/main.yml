name: Ubuntu Plus Ultimate No-Error
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🧹 Total Disk Clean
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift
          sudo docker image prune -a -f
          sudo apt-get clean

      - name: 🛠️ Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget curl p7zip-full || true

      - name: 💿 ISO Download & Extract (Guaranteed)
        run: |
          # تحميل النسخة مع التأكد من اكتمال الملف
          curl -L -o base.iso https://mirrors.kernel.org/ubuntu-releases/24.04/ubuntu-24.04-desktop-amd64.iso || exit 1
          
          # إنشاء المجلد x وفك الملفات
          mkdir -p x
          7z x base.iso -ox/ -y || true
          
          # أهم خطوة: التأكد إن المجلد x مش فاضي
          if [ -d "x/casper" ]; then
            echo "✅ ISO Extracted successfully to folder x"
            sudo chmod -R 777 x
          else
            echo "❌ Extraction Failed! Check Disk Space or ISO Link." && exit 1
          fi
          rm base.iso

      - name: 🏗️ Execute build.sh
        run: |
          if [ -f "build.sh" ]; then
            chmod +x build.sh
            # تشغيل السكريبت مع تجاهل الأخطاء البسيطة لضمان خروج الـ ISO
            sudo -E DEBIAN_FRONTEND=noninteractive ./build.sh || echo "⚠️ Minor errors in build script, moving to packing..."
          else
            echo "❌ build.sh NOT FOUND!" && exit 1
          fi

      - name: 📦 Final Pack (Xorriso Method)
        run: |
          # تجميع الـ ISO النهائي بأمان
          sudo xorriso -as mkisofs -r -V "Ubuntu-Plus-X" -o Ubuntu-Plus-Final.iso x/

      - name: 📤 Upload Final Result
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-Plus-ISO-Final
          path: Ubuntu-Plus-Final.iso
          retention-days: 90
